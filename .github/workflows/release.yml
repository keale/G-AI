name: Test, Build and Release MCP Toolkit

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
      - 'test-*'

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: TEST (Runs on EVERY push)
  # ==========================================
  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Caraya Test Suite
        run: |
          Write-Host "Starting LabVIEW CLI to run tests..."
          $testVI = "$env:GITHUB_WORKSPACE\tests\Run_G-AI_Tests_CLI.vi"
          
          # Path to LabVIEW 2020 executable
          $lv2020Path = "C:\Program Files\National Instruments\LabVIEW 2020\LabVIEW.exe"
          
          # Force CLI to use LabVIEW 2020 and its specific VI Server port
          LabVIEWCLI -OperationName RunVI -VIPath "$testVI" -PortNumber 3363 -LabVIEWPath "$lv2020Path"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tests FAILED! Blocking build."
            exit 1
          } else {
            Write-Host "All tests PASSED!"
          }
  # ==========================================
  # JOB 2: BUILD (Runs ONLY on Tags, and ONLY if Tests pass)
  # ==========================================
  build-and-release:
    needs: test 
    if: startsWith(github.ref, 'refs/tags/') # <--- Only build if it's a tag!
    runs-on: self-hosted
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-tags: true 

      - name: Apply Dependencies via VIPM CLI
        timeout-minutes: 15
        run: |
          $vipcFile = "$env:GITHUB_WORKSPACE\src\G-AI.vipc" 
          
          Write-Host "Installing VI Package Configuration dependencies..."
          vipm install "$vipcFile"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VIPM CLI failed to install dependencies with exit code $LASTEXITCODE."
            exit 1
          }
          Write-Host "Dependencies installed successfully!"

      - name: Build VI Package via VIPM CLI
        timeout-minutes: 25 
        env:
          VIPM_CLI_TIMEOUT: 1200
        run: |
          $vipbFile = "$env:GITHUB_WORKSPACE\src\G-AI.vipb"
          
          $gitTag = "${{ github.ref_name }}"
          Write-Host "Detected Tag: $gitTag"
          
          # 1. Extract the Annotated Tag Message using the Git CLI
          $tagMsg = (git tag -l --format='%(contents)' $gitTag) -join "`n"
          
          # 2. Fallback to the commit message if the tag was left blank
          if ([string]::IsNullOrWhiteSpace($tagMsg)) {
            $tagMsg = "${{ github.event.head_commit.message }}"
            Write-Host "No tag message found. Falling back to commit message."
          } else {
            Write-Host "Found annotated tag message!"
          }
          
          Write-Host "Release Notes to use:`n$tagMsg"
          
          # 3. Update the Version Number (Only if it's a 'v' release tag)
          $vipbContent = Get-Content $vipbFile
          
          if ($gitTag -match "v?(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?") {
            $major = $matches[1]
            $minor = $matches[2]
            $patch = $matches[3]
            $build = if ($matches[4]) { $matches[4] } else { 0 }
            
            $newVersion = "$major.$minor.$patch.$build"
            Write-Host "Updating VIPB to version: $newVersion"
            $vipbContent = $vipbContent -replace "<Library_Version>.*?</Library_Version>", "<Library_Version>$newVersion</Library_Version>"
          }
          
          # 4. Inject the Release Notes into the VIPB
          $safeMsg = [System.Security.SecurityElement]::Escape($tagMsg)
          $vipbContent = $vipbContent -replace "<Release_Notes>.*?</Release_Notes>", "<Release_Notes>$safeMsg</Release_Notes>"
          
          Set-Content -Path $vipbFile -Value $vipbContent

          # 5. Run the build
          Write-Host "Building VI Package..."
          vipm build "$vipbFile"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "VIPM CLI build failed with exit code $LASTEXITCODE."
            exit 1
          }

      - name: Locate Built VIP Artifact
        id: find_vip
        run: |
          $vipFile = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\builds" | Where-Object { $_.Extension -eq ".vip" } | Select-Object -First 1
          echo "VIP_PATH=$($vipFile.FullName)" >> $env:GITHUB_ENV

      - name: Upload Artifact for Testing
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-vip-package
          path: ${{ env.VIP_PATH }}

      - name: Create GitHub Release and Upload VIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VIP_PATH }}
          generate_release_notes: true